<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Bottle body -->
  <rect x="20" y="16" width="24" height="36" fill="#7b68ee" rx="2"/>
  <rect x="22" y="18" width="20" height="32" fill="#9370db"/>
  <!-- Liquid -->
  <rect x="22" y="28" width="20" height="22" fill="#00ff88" opacity="0.7"/>
  <rect x="24" y="30" width="16" height="18" fill="#00ffaa" opacity="0.5"/>
  <!-- Bubbles -->
  <rect x="28" y="34" width="4" height="4" fill="#fff" opacity="0.4"/>
  <rect x="34" y="38" width="3" height="3" fill="#fff" opacity="0.3"/>
  <rect x="30" y="42" width="2" height="2" fill="#fff" opacity="0.3"/>
  <!-- Neck -->
  <rect x="26" y="8" width="12" height="10" fill="#7b68ee"/>
  <rect x="28" y="10" width="8" height="6" fill="#9370db"/>
  <!-- Cork -->
  <rect x="24" y="4" width="16" height="6" fill="#8B4513"/>
  <rect x="26" y="6" width="12" height="2" fill="#a0522d"/>
  <!-- Highlight -->
  <rect x="24" y="20" width="4" height="24" fill="#fff" opacity="0.15"/>
</svg>
