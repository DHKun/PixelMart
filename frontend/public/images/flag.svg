<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Flag pole -->
  <rect x="30" y="4" width="4" height="56" fill="#8B4513"/>
  <rect x="32" y="6" width="2" height="52" fill="#a0522d"/>
  <!-- Flag -->
  <rect x="8" y="6" width="24" height="20" fill="#ff4444"/>
  <rect x="10" y="8" width="20" height="16" fill="#ff6666"/>
  <!-- Star on flag -->
  <rect x="16" y="10" width="8" height="2" fill="#ffd700"/>
  <rect x="18" y="12" width="4" height="8" fill="#ffd700"/>
  <rect x="14" y="14" width="12" height="2" fill="#ffd700"/>
  <rect x="16" y="18" width="8" height="2" fill="#ffd700"/>
  <!-- Flag wave effect -->
  <rect x="6" y="24" width="4" height="2" fill="#ff4444"/>
  <rect x="4" y="22" width="2" height="4" fill="#ff4444"/>
  <!-- Base -->
  <rect x="24" y="56" width="16" height="6" fill="#666"/>
  <rect x="26" y="58" width="12" height="2" fill="#888"/>
  <!-- Glow -->
  <rect x="10" y="8" width="2" height="16" fill="#fff" opacity="0.2"/>
</svg>
