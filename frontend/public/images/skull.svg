<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Skull shape -->
  <rect x="16" y="12" width="32" height="32" fill="#e0e0e0"/>
  <rect x="18" y="14" width="28" height="28" fill="#f0f0f0"/>
  <!-- Top of skull -->
  <rect x="20" y="8" width="24" height="6" fill="#e0e0e0"/>
  <rect x="22" y="10" width="20" height="4" fill="#f0f0f0"/>
  <!-- Eye sockets -->
  <rect x="16" y="20" width="10" height="10" fill="#1a1a2e"/>
  <rect x="38" y="20" width="10" height="10" fill="#1a1a2e"/>
  <rect x="18" y="22" width="6" height="6" fill="#0a0a1a"/>
  <rect x="40" y="22" width="6" height="6" fill="#0a0a1a"/>
  <!-- Eye glow -->
  <rect x="20" y="24" width="2" height="2" fill="#ff4444"/>
  <rect x="42" y="24" width="2" height="2" fill="#ff4444"/>
  <!-- Nose -->
  <rect x="30" y="26" width="4" height="6" fill="#1a1a2e"/>
  <rect x="28" y="28" width="8" height="2" fill="#0a0a1a"/>
  <!-- Mouth -->
  <rect x="22" y="34" width="20" height="4" fill="#1a1a2e"/>
  <rect x="24" y="36" width="16" height="2" fill="#0a0a1a"/>
  <!-- Teeth -->
  <rect x="24" y="34" width="4" height="2" fill="#f0f0f0"/>
  <rect x="36" y="34" width="4" height="2" fill="#f0f0f0"/>
  <!-- Crystal glow -->
  <rect x="14" y="44" width="36" height="8" fill="#9370db" opacity="0.3"/>
  <rect x="18" y="46" width="28" height="4" fill="#7b68ee" opacity="0.3"/>
  <!-- Crack -->
  <rect x="30" y="16" width="2" height="6" fill="#888"/>
  <rect x="28" y="20" width="6" height="2" fill="#888"/>
</svg>
