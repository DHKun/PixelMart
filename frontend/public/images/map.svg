<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Scroll/Parchment -->
  <rect x="8" y="8" width="48" height="48" fill="#d4a574"/>
  <rect x="10" y="10" width="44" height="44" fill="#e8c49a"/>
  <!-- Rolled top -->
  <rect x="6" y="6" width="52" height="6" fill="#c49464"/>
  <rect x="8" y="8" width="48" height="2" fill="#d4a574"/>
  <!-- Rolled bottom -->
  <rect x="6" y="52" width="52" height="6" fill="#c49464"/>
  <rect x="8" y="54" width="48" height="2" fill="#d4a574"/>
  <!-- Map lines -->
  <rect x="16" y="18" width="32" height="2" fill="#8B4513" opacity="0.6"/>
  <rect x="16" y="24" width="24" height="2" fill="#8B4513" opacity="0.6"/>
  <rect x="16" y="30" width="28" height="2" fill="#8B4513" opacity="0.6"/>
  <rect x="16" y="36" width="20" height="2" fill="#8B4513" opacity="0.6"/>
  <!-- Treasure X mark -->
  <rect x="36" y="38" width="4" height="4" fill="#ff4444"/>
  <rect x="34" y="36" width="8" height="2" fill="#ff4444"/>
  <rect x="34" y="42" width="8" height="2" fill="#ff4444"/>
  <rect x="38" y="34" width="2" height="12" fill="#ff4444"/>
  <!-- Compass rose -->
  <rect x="40" y="16" width="2" height="10" fill="#8B4513"/>
  <rect x="36" y="20" width="10" height="2" fill="#8B4513"/>
  <rect x="38" y="18" width="6" height="6" fill="#8B4513" opacity="0.4"/>
</svg>
