<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Blade -->
  <rect x="28" y="4" width="8" height="32" fill="#c0c0c0"/>
  <rect x="24" y="8" width="16" height="4" fill="#e0e0e0"/>
  <rect x="24" y="20" width="16" height="4" fill="#e0e0e0"/>
  <rect x="26" y="4" width="4" height="2" fill="#fff"/>
  <!-- Guard -->
  <rect x="16" y="36" width="32" height="4" fill="#8B4513"/>
  <rect x="18" y="34" width="28" height="2" fill="#a0522d"/>
  <rect x="18" y="40" width="28" height="2" fill="#6b3410"/>
  <!-- Handle -->
  <rect x="28" y="40" width="8" height="16" fill="#8B4513"/>
  <rect x="30" y="42" width="4" height="12" fill="#a0522d"/>
  <!-- Pommel -->
  <rect x="26" y="56" width="12" height="6" fill="#ffd700"/>
  <rect x="28" y="58" width="8" height="2" fill="#ffec80"/>
  <!-- Glow effect -->
  <rect x="30" y="6" width="2" height="28" fill="#fff" opacity="0.3"/>
</svg>
