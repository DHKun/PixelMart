  <!-- Scale details -->
  <rect x="22" y="16" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <rect x="30" y="16" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <rect x="38" y="16" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <rect x="22" y="28" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <rect x="30" y="28" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <rect x="38" y="28" width="4" height="2" fill="#ffa07a" opacity="0.4"/>
  <!-- Border trim -->
  <rect x="12" y="6" width="4" height="44" fill="#ffd700"/>
  <rect x="48" y="6" width="4" height="44" fill="#ffd700"/>
  <rect x="16" y="4" width="32" height="4" fill="#ffd700"/>
  <rect x="22" y="48" width="20" height="2" fill="#ffd700"/>
