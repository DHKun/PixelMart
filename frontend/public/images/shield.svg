  <rect x="12" y="6" width="40" height="44" fill="#8B4513"/>
  <rect x="14" y="8" width="36" height="40" fill="#a0522d"/>
  <!-- Shield top curve -->
  <rect x="16" y="4" width="32" height="6" fill="#8B4513"/>
  <rect x="18" y="6" width="28" height="4" fill="#a0522d"/>
  <!-- Shield bottom point -->
  <rect x="22" y="48" width="20" height="8" fill="#8B4513"/>
  <rect x="24" y="50" width="16" height="4" fill="#a0522d"/>
  <!-- Dragon scale pattern -->
  <rect x="20" y="14" width="24" height="6" fill="#ff6347" opacity="0.6"/>
  <rect x="18" y="20" width="28" height="6" fill="#ff4500" opacity="0.5"/>
  <rect x="20" y="26" width="24" height="6" fill="#ff6347" opacity="0.6"/>
  <rect x="18" y="32" width="28" height="6" fill="#ff4500" opacity="0.5"/>
